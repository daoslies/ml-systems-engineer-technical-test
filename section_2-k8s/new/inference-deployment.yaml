# Signapse — inference service deployment
# Deploys the sign language video generation model as a Kubernetes service.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  labels:
    app.kubernetes.io/name: inference
    app.kubernetes.io/component: ml-inference
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
        app.kubernetes.io/name: inference
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: inference
          image: signapse/inference:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inference-secrets
                  key: model-api-key
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
              nvidia.com/gpu: 1
            limits:
              memory: "512Mi"
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet: 
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: inference
spec:
  selector:
    app: inference
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
